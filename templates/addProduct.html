{% extends 'base.html' %}

{% block header %}
    <div class="head_contect">
        <h2>Add Product</h2>
    </div>
{% endblock %}

{% block addProduct %}
    <div class="add-container">
        <h5>Fill in Poduct details</h5>
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="Product name" required><br>

            <input type="text" name="category" placeholder="Category" required><br>

            <textarea name="description" placeholder="Product description" required></textarea><br>

            <input type="number" step="0.01" name="nowPrice" placeholder="Current price" required><br>

            <input type="number" step="0.01" name="wasPrice" placeholder="Initial price" required><br>

            <input type="number" step="0.01" name="rating" placeholder="Ratting" required><br>

            <input type="text" name="availability" placeholder="Availability" required><br>

            <input type="text" name="skinType" placeholder="Skin Type" required><br>

            <input type="number" name="volume" placeholder="Volume" required><br>

            <input type="number" step="0.01" name="span" placeholder="Period After Openning" required><br>

            <input type="text" name="applicationType" placeholder="Application Type" required><br>

            <input type="text" name="packaging" placeholder="Packaging" required><br>

            <input type="file" name="image" accept="image/*"><br>

            <button type="submit">Add Product</button>
        </form>
        
    </div>
{% endblock %}
